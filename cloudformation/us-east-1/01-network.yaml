AWSTemplateFormatVersion: '2010-09-09'
Description: 'Stage 1: Foundational Network for Primary Region (us-east-1)'

Parameters:
  VpcCIDR:
    Type: String
    Default: '10.10.0.0/16'

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'primary-vpc-us-east-1'

  # ... Subnets, Route Tables, IGW, NAT Gateways ...

Outputs:
  VpcId:
    Value: !Ref VPC
