AWSTemplateFormatVersion: '2010-09-09'
Description: 'Stage 3: Foundational Network for Secondary Region (us-west-2)'

Parameters:
  VpcCIDR:
    Type: String
    Default: '10.20.0.0/16'

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'secondary-vpc-us-west-2'

  # ... Subnets, Route Tables, IGW, NAT Gateways ...

Outputs:
  VpcId:
    Value: !Ref VPC
